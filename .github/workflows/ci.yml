name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-
      - name: build
        run: cargo build --workspace
      - name: test
        run: cargo test --workspace

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-cov-
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --version "~0.31" --locked
      - name: Run coverage
        run: cargo tarpaulin --workspace --out json --output-dir coverage
      - name: Print coverage summary
        run: |
          if [ -f coverage/tarpaulin-report.json ]; then
            echo "## Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
            python3 -c "
          import json, sys
          data = json.load(open('coverage/tarpaulin-report.json'))
          covered = sum(1 for f in data.get('files', []) for l in f.get('traces', []) if l.get('stats', {}).get('Line', 0) > 0) if 'files' in data else 0
          total_covered = data.get('covered_lines', 0) if 'covered_lines' in data else 0
          total_coverable = data.get('coverable_lines', 0) if 'coverable_lines' in data else 0
          pct = (total_covered / total_coverable * 100) if total_coverable > 0 else 0
          print(f'Coverage: {total_covered}/{total_coverable} lines ({pct:.1f}%)')
          " | tee -a "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/tarpaulin-report.json

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        # RUSTSEC-2023-0071: rsa timing sidechannel — pulled in via sqlx-mysql
        # which we do not use (SQLite-only). No upstream fix available.
        run: cargo audit --ignore RUSTSEC-2023-0071

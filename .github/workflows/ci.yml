name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-
      - name: build
        run: cargo build --workspace
      - name: test
        run: cargo test --workspace
      - name: test (cli without evolution feature)
        run: cargo test -p harness-cli --no-default-features
      - name: e2e benchmark gate (echo; matches baseline_pass_rate)
        run: |
          set -euo pipefail
          BASELINE=$(awk '/^[-0-9.]+$/ {print; exit}' crates/benchmark/baseline_pass_rate | tr -d '\r')
          OUT="$(cargo run -p harness-benchmark --bin anvil-bench -- --iterations 2 --provider echo 2>&1)"
          printf '%s\n' "$OUT"
          SCORE="$(printf '%s\n' "$OUT" | grep BENCH_OVERALL_PASS_RATE | awk '{print $2}')"
          python3 -c "import sys; b=float('$BASELINE'); s=float('$SCORE'); sys.exit(0 if s+1e-9>=b else 1)"

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        # RUSTSEC-2023-0071: rsa timing sidechannel — pulled in via sqlx-mysql
        # which we do not use (SQLite-only). No upstream fix available.
        run: cargo audit --ignore RUSTSEC-2023-0071

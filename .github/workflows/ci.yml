name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-
      - name: build
        run: cargo build --workspace
      - name: test
        run: cargo test --workspace

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-cov-
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --version "~0.31" --locked
      - name: Run coverage
        run: cargo tarpaulin --workspace --out json --output-dir coverage
      - name: Print coverage summary
        run: |
          if [ -f coverage/tarpaulin-report.json ]; then
            echo "## Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
            python3 -c "
          import json
          data = json.load(open('coverage/tarpaulin-report.json'))
          files = data if isinstance(data, list) else data.get('files', [])
          total = 0; covered = 0
          for f in files:
              for t in f.get('traces', []):
                  total += 1
                  if t.get('stats', {}).get('Line', 0) > 0:
                      covered += 1
          pct = (covered / total * 100) if total > 0 else 0
          print(f'Coverage: {covered}/{total} lines ({pct:.1f}%)')
          " | tee -a "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/tarpaulin-report.json

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies
        # RUSTSEC-2023-0071: rsa timing sidechannel — pulled in via sqlx-mysql
        # which we do not use (SQLite-only). No upstream fix available.
        run: cargo audit --ignore RUSTSEC-2023-0071

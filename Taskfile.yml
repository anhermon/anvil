# https://taskfile.dev
version: '3'

tasks:
  default:
    desc: List available tasks
    silent: true
    cmds:
      - task --list

  install:
    desc: Install the anvil CLI binary to PATH
    cmds:
      - cargo install --path crates/cli

  build:
    desc: Build release binary
    cmds:
      - cargo build --release

  test:
    desc: Run all workspace tests
    cmds:
      - cargo test --workspace

  lint:
    desc: Run clippy with -D warnings
    cmds:
      - cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    desc: Format all source code
    cmds:
      - cargo fmt --all

  check:
    desc: Run fmt, lint, and test (full CI gate)
    cmds:
      - task: fmt
      - task: lint
      - task: test
      - echo "All checks passed"

  bench:run:
    desc: Run e2e benchmark N times against a real LLM
    vars:
      ITERATIONS: '{{.ITERATIONS | default 5}}'
      MODEL: '{{.MODEL | default "glm-4.7-flash"}}'
      BASE_URL: '{{.BASE_URL | default "http://localhost:11434"}}'
      MAX_TURNS: '{{.MAX_TURNS | default 15}}'
    cmds:
      - cargo run --release --bin anvil-bench -- --iterations {{.ITERATIONS}} --model {{.MODEL}} --base-url {{.BASE_URL}} --max-turns {{.MAX_TURNS}}

  bench:ci:
    desc: Run e2e benchmark with mock provider (CI-safe, no API key)
    vars:
      ITERATIONS: '{{.ITERATIONS | default 3}}'
    cmds:
      - cargo run --release --bin anvil-bench -- --iterations {{.ITERATIONS}} --provider echo

  bench:gate:
    desc: Fail if BENCH_OVERALL_PASS_RATE is below crates/benchmark/baseline_pass_rate (first numeric line)
    vars:
      ITERATIONS: '{{.ITERATIONS | default 3}}'
      PROVIDER: '{{.PROVIDER | default "echo"}}'
    cmds:
      - |
        set -euo pipefail
        BASELINE=$(awk '/^[-0-9.]+$/ {print; exit}' crates/benchmark/baseline_pass_rate | tr -d '\r')
        OUT="$(cargo run --release -p harness-benchmark --bin anvil-bench -- --iterations {{.ITERATIONS}} --provider {{.PROVIDER}} 2>&1)"
        printf '%s\n' "$OUT"
        SCORE="$(printf '%s\n' "$OUT" | grep BENCH_OVERALL_PASS_RATE | awk '{print $2}')"
        python3 -c "import sys; b=float('$BASELINE'); s=float('$SCORE'); sys.exit(0 if s+1e-9>=b else 1)" \
          || { echo "bench gate: score $SCORE < baseline $BASELINE" >&2; exit 1; }
        echo "bench gate: score $SCORE >= baseline $BASELINE"

  bench:evolution:
    desc: Run evolution-focused benchmark — tests if agent improves across iterations
    vars:
      ITERATIONS: '{{.ITERATIONS | default 10}}'
      MODEL: '{{.MODEL | default "glm-4.7-flash"}}'
      BASE_URL: '{{.BASE_URL | default "http://localhost:11434"}}'
    cmds:
      - cargo run --release --bin anvil-bench -- --iterations {{.ITERATIONS}} --model {{.MODEL}} --base-url {{.BASE_URL}} --max-turns 20

  worktree:self-improve:
    desc: Create an isolated git worktree on a new branch for self-improve / benchmark loops
    vars:
      BRANCH: '{{.BRANCH | default "experiment/glm47-self-improve"}}'
      WT_PATH: '{{.WT_PATH | default "../anvil-glm47-loop"}}'
    cmds:
      - git worktree add -b {{.BRANCH}} {{.WT_PATH}} HEAD

  bench:capability-md:
    desc: Run anvil-bench against Ollama and write Markdown capability snapshot under target/benchmark_reports/
    vars:
      ITERATIONS: '{{.ITERATIONS | default 5}}'
      MODEL: '{{.MODEL | default "glm-4.7-lite"}}'
      BASE_URL: '{{.BASE_URL | default "http://localhost:11434"}}'
      TIER: '{{.TIER | default "default"}}'
    cmds:
      - mkdir -p target/benchmark_reports
      - |
        set -euo pipefail
        EXTRA=""
        if [ "{{.TIER}}" = "hard" ]; then EXTRA="--tier hard"; fi
        cargo run --release -p harness-benchmark --bin anvil-bench -- \
          --iterations {{.ITERATIONS}} --model {{.MODEL}} --base-url {{.BASE_URL}} \
          $EXTRA \
          --summary-md target/benchmark_reports/capability.md

  self-improve:loop:
    desc: anvil (Ollama) edits repo → gates → benchmark; on strictly higher pass rate, auto-commit (see scripts/self_improve_loop.sh)
    vars:
      LOOPS: '{{.LOOPS | default 3}}'
      MODEL: '{{.MODEL | default "glm-4.7-lite"}}'
      BENCH_ITER: '{{.BENCH_ITER | default 3}}'
      TIER: '{{.TIER | default "default"}}'
      BASE_URL: '{{.BASE_URL | default "http://localhost:11434"}}'
    env:
      LOOPS: '{{.LOOPS}}'
      MODEL: '{{.MODEL}}'
      BENCH_ITER: '{{.BENCH_ITER}}'
      TIER: '{{.TIER}}'
      BENCH_BASE_URL: '{{.BASE_URL}}'
    cmds:
      - bash scripts/self_improve_loop.sh

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 80" fill="none">
  <!--
    Anvil — icon + wordmark lockup
    Left zone (0–70): icon at 0.6 scale
    Divider at x=72
    Right zone (80–230): geometric sans-serif wordmark "anvil"
    Monochrome — uses currentColor throughout.
  -->

  <!-- === ICON (0.6 scale, vertically centered in 80px tall canvas) === -->
  <g transform="translate(3, 8) scale(0.63)">
    <rect x="18" y="83" width="25" height="8" rx="2" fill="currentColor"/>
    <rect x="57" y="83" width="25" height="8" rx="2" fill="currentColor"/>
    <path d="M28 73 L72 73 L65 83 L35 83 Z" fill="currentColor"/>
    <path d="M20 57 L80 57 L80 65 L72 73 L28 73 L20 65 Z" fill="currentColor"/>
    <rect x="65" y="58.5" width="8" height="6" rx="1" fill="white"/>
    <path d="M20 57 L20 65 L5 62 Z" fill="currentColor"/>
    <rect x="19" y="53" width="62" height="4.5" rx="1.5" fill="currentColor"/>
  </g>

  <!-- Divider -->
  <line x1="72" y1="15" x2="72" y2="65" stroke="currentColor" stroke-width="1.5"
        stroke-linecap="round" opacity="0.2"/>

  <!--
    === WORDMARK: "anvil" ===
    Stroke-based geometric sans letterforms.
    Cap height: 28px. Baseline: y=58. Start: x=82.
    Stroke: width=4, round caps+joins, no fill.
    Letter spacing: ~18px per glyph, 4px gap between letters.

    a  — full circle (bowl) + right descending stem
    n  — left stem + arch to right stem
    v  — chevron (two diagonals meeting at bottom point)
    i  — vertical stem + dot above
    l  — tall vertical stem
  -->
  <g fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">

    <!-- a: bowl center (91, 46), r=10; open on the right; stem from top-right down to baseline -->
    <path d="M101 47 A10 10 0 1 0 101 49"/>
    <line x1="101" y1="37" x2="101" y2="58"/>

    <!-- n: left stem; arch; right stem -->
    <line x1="112" y1="37" x2="112" y2="58"/>
    <path d="M112 42 C112 35 119 35 119 35 C126 35 126 42 126 42 L126 58"/>

    <!-- v: two legs converging -->
    <polyline points="133,36 140,58 147,36"/>

    <!-- i: stem + dot -->
    <line x1="155" y1="43" x2="155" y2="58"/>
    <circle cx="155" cy="35" r="2.5" fill="currentColor" stroke="none"/>

    <!-- l: tall stem -->
    <line x1="164" y1="24" x2="164" y2="58"/>

  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!--
    Anvil — provider-agnostic Rust AI agent runtime
    Monochrome silhouette, works on dark and light backgrounds via currentColor.
    Shape: classic blacksmith's anvil, side-view.
      - Top face: flat work surface
      - Horn: left-pointing taper
      - Table: wide platform below the top face
      - Waist: tapered body
      - Feet: two rectangular feet at the base
  -->

  <!-- Feet — left and right, rectangular with rounded corners -->
  <rect x="18" y="83" width="25" height="8" rx="2" fill="currentColor"/>
  <rect x="57" y="83" width="25" height="8" rx="2" fill="currentColor"/>

  <!-- Waist — trapezoid connecting table bottom edge to the feet -->
  <path d="M28 73 L72 73 L65 83 L35 83 Z" fill="currentColor"/>

  <!-- Table body — hexagonal platform (tapers from table face to waist) -->
  <path d="M20 57 L80 57 L80 65 L72 73 L28 73 L20 65 Z" fill="currentColor"/>

  <!-- Hardy hole — small rectangular tool hole cut into the table (top-right area) -->
  <rect x="65" y="58.5" width="8" height="6" rx="1" fill="white"/>

  <!-- Horn — left-pointing triangular projection off the table -->
  <path d="M20 57 L20 65 L5 62 Z" fill="currentColor"/>

  <!-- Top face — flat work surface, slightly wider than the table body -->
  <rect x="19" y="53" width="62" height="4.5" rx="1.5" fill="currentColor"/>
</svg>

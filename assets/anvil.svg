<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!--
    Anvil — app icon (200×200) v3
    Graceful Q-bezier horn (~26% of body width), chevron-flared feet,
    orange ember glow on work face top edge, rim lighting.
  -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#111111"/>
    </radialGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#909090"/>
      <stop offset="20%"  stop-color="#747474"/>
      <stop offset="60%"  stop-color="#555555"/>
      <stop offset="100%" stop-color="#3a3a3a"/>
    </linearGradient>
    <linearGradient id="horn-grad" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%"   stop-color="#747474"/>
      <stop offset="100%" stop-color="#484848"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6a6a6a"/>
      <stop offset="35%"  stop-color="#a0a0a0"/>
      <stop offset="65%"  stop-color="#a0a0a0"/>
      <stop offset="100%" stop-color="#6a6a6a"/>
    </linearGradient>
    <linearGradient id="ember" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#bb2200" stop-opacity="0"/>
      <stop offset="8%"   stop-color="#ff4400"/>
      <stop offset="30%"  stop-color="#ff7700"/>
      <stop offset="50%"  stop-color="#ff9900"/>
      <stop offset="70%"  stop-color="#ff7700"/>
      <stop offset="92%"  stop-color="#ff4400"/>
      <stop offset="100%" stop-color="#bb2200" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow-edge" x="-20%" y="-600%" width="140%" height="1400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-halo" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <ellipse cx="115" cy="66" rx="72" ry="22"
           fill="#ff5500" opacity="0.32" filter="url(#glow-halo)"/>
  <path d="
    M 38,80
    L 162,80
    L 162,96
    C 157,96 152,104 148,116
    L 146,132
    L 158,148
    L 164,170
    L 114,170
    L 110,150
    L 90,150
    L 86,170
    L 36,170
    L 42,148
    L 54,132
    L 52,116
    C 48,104 43,96 38,96
    Z
  " fill="url(#steel)"/>
  <path d="M 90,150 C 94,159 100,165 100,170 C 100,165 106,159 110,150 Z"
        fill="#111111" opacity="0.75"/>
  <path d="
    M 8,88
    Q 22,80 38,80
    L 38,96
    Q 22,98 8,88
    Z
  " fill="url(#horn-grad)"/>
  <rect x="52" y="70" width="110" height="10" rx="2" fill="url(#face)"/>
  <rect x="148" y="72" width="12" height="8" rx="1.5"
        fill="#111111" opacity="0.9"/>
  <rect x="38" y="80" width="14" height="10" rx="1"
        fill="#888888" opacity="0.30"/>
  <path d="M 8,88 Q 22,80 38,80"
        fill="none" stroke="#c8c8c8" stroke-width="1.2" opacity="0.45"/>
  <line x1="38" y1="80" x2="38" y2="96"
        stroke="#b8b8b8" stroke-width="1.5" opacity="0.35"/>
  <line x1="38" y1="80" x2="100" y2="80"
        stroke="#b0b0b0" stroke-width="1.0" opacity="0.30"/>
  <line x1="52" y1="70" x2="52" y2="80"
        stroke="#ff6600" stroke-width="1.5" opacity="0.50"/>
  <path d="
    M 8,88
    Q 22,80 38,80
    L 162,80
    L 162,96
    C 157,96 152,104 148,116
    L 146,132 L 158,148 L 164,170
    L 36,170
    L 42,148 L 54,132 L 52,116
    C 48,104 43,96 38,96
    Q 22,98 8,88
  " fill="none" stroke="#1a1a1a" stroke-width="1.5" opacity="0.55"/>
  <rect x="42" y="60" width="130" height="14" rx="6"
        fill="#ff5500" opacity="0.38" filter="url(#glow-halo)"/>
  <rect x="52" y="67" width="110" height="5" rx="2.5"
        fill="url(#ember)" filter="url(#glow-edge)"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!--
    anvil-github-avatar.svg — 400×400 GitHub profile avatar.
    Same design as anvil.svg (200×200) scaled 2x with extra padding.
  -->
  <defs>
    <radialGradient id="ga-bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#111111"/>
    </radialGradient>
    <linearGradient id="ga-steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#909090"/>
      <stop offset="20%"  stop-color="#747474"/>
      <stop offset="60%"  stop-color="#555555"/>
      <stop offset="100%" stop-color="#3a3a3a"/>
    </linearGradient>
    <linearGradient id="ga-horn" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%"   stop-color="#747474"/>
      <stop offset="100%" stop-color="#484848"/>
    </linearGradient>
    <linearGradient id="ga-face" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6a6a6a"/>
      <stop offset="35%"  stop-color="#a0a0a0"/>
      <stop offset="65%"  stop-color="#a0a0a0"/>
      <stop offset="100%" stop-color="#6a6a6a"/>
    </linearGradient>
    <linearGradient id="ga-ember" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#bb2200" stop-opacity="0"/>
      <stop offset="8%"   stop-color="#ff4400"/>
      <stop offset="30%"  stop-color="#ff7700"/>
      <stop offset="50%"  stop-color="#ff9900"/>
      <stop offset="70%"  stop-color="#ff7700"/>
      <stop offset="92%"  stop-color="#ff4400"/>
      <stop offset="100%" stop-color="#bb2200" stop-opacity="0"/>
    </linearGradient>
    <filter id="ga-glow-edge" x="-20%" y="-600%" width="140%" height="1400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ga-glow-halo" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
  </defs>
  <!-- Background (full 400×400 rounded square) -->
  <rect width="400" height="400" rx="80" fill="url(#ga-bg)"/>
  <!-- Halo — centered around x=230, y=132 (2x scale from x=115,y=66) -->
  <ellipse cx="230" cy="132" rx="144" ry="44"
           fill="#ff5500" opacity="0.32" filter="url(#ga-glow-halo)"/>
  <!-- Body (all coords ×2) -->
  <path d="
    M 76,160 L 324,160 L 324,192
    C 314,192 304,208 296,232
    L 292,264 L 316,296 L 328,340
    L 228,340 L 220,300 L 180,300
    L 172,340 L 72,340 L 84,296
    L 108,264 L 104,232
    C 96,208 86,192 76,192 Z
  " fill="url(#ga-steel)"/>
  <!-- Inner arch -->
  <path d="M 180,300 C 188,318 200,330 200,340 C 200,330 212,318 220,300 Z"
        fill="#111111" opacity="0.75"/>
  <!-- Horn (tip at x=16, 2x scale) -->
  <path d="M 16,176 Q 44,160 76,160 L 76,192 Q 44,196 16,176 Z"
        fill="url(#ga-horn)"/>
  <!-- Work face -->
  <rect x="104" y="140" width="220" height="20" rx="4" fill="url(#ga-face)"/>
  <!-- Hardy hole -->
  <rect x="296" y="144" width="24" height="16" rx="3" fill="#111111" opacity="0.9"/>
  <!-- Step -->
  <rect x="76" y="160" width="28" height="20" rx="2" fill="#888888" opacity="0.30"/>
  <!-- Rim lighting -->
  <path d="M 16,176 Q 44,160 76,160"
        fill="none" stroke="#c8c8c8" stroke-width="2.4" opacity="0.45"/>
  <!-- Ambient glow -->
  <rect x="84" y="120" width="260" height="28" rx="12"
        fill="#ff5500" opacity="0.38" filter="url(#ga-glow-halo)"/>
  <!-- Ember line -->
  <rect x="104" y="134" width="220" height="10" rx="5"
        fill="url(#ga-ember)" filter="url(#ga-glow-edge)"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!--
    anvil-light.svg — light-mode variant (200×200).
    Light warm-white background, dark steel anvil, orange ember retained.
    Drop-in replacement for anvil.svg on light backgrounds.
  -->
  <defs>
    <radialGradient id="bg-l" cx="50%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#f5f5f0"/>
      <stop offset="100%" stop-color="#e8e8e2"/>
    </radialGradient>
    <linearGradient id="steel-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#606060"/>
      <stop offset="20%"  stop-color="#484848"/>
      <stop offset="60%"  stop-color="#333333"/>
      <stop offset="100%" stop-color="#1c1c1c"/>
    </linearGradient>
    <linearGradient id="horn-l" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%"   stop-color="#484848"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <linearGradient id="face-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#484848"/>
      <stop offset="35%"  stop-color="#707070"/>
      <stop offset="65%"  stop-color="#707070"/>
      <stop offset="100%" stop-color="#484848"/>
    </linearGradient>
    <linearGradient id="ember-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#bb2200" stop-opacity="0"/>
      <stop offset="8%"   stop-color="#ff4400"/>
      <stop offset="30%"  stop-color="#ff7700"/>
      <stop offset="50%"  stop-color="#ff9900"/>
      <stop offset="70%"  stop-color="#ff7700"/>
      <stop offset="92%"  stop-color="#ff4400"/>
      <stop offset="100%" stop-color="#bb2200" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow-edge-l" x="-20%" y="-600%" width="140%" height="1400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-halo-l" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg-l)"/>
  <ellipse cx="115" cy="66" rx="72" ry="22"
           fill="#ff6600" opacity="0.20" filter="url(#glow-halo-l)"/>
  <path d="
    M 38,80 L 162,80 L 162,96
    C 157,96 152,104 148,116
    L 146,132 L 158,148 L 164,170
    L 114,170 L 110,150 L 90,150
    L 86,170 L 36,170 L 42,148
    L 54,132 L 52,116
    C 48,104 43,96 38,96 Z
  " fill="url(#steel-l)"/>
  <path d="M 90,150 C 94,159 100,165 100,170 C 100,165 106,159 110,150 Z"
        fill="url(#bg-l)" opacity="0.9"/>
  <path d="M 8,88 Q 22,80 38,80 L 38,96 Q 22,98 8,88 Z" fill="url(#horn-l)"/>
  <rect x="52" y="70" width="110" height="10" rx="2" fill="url(#face-l)"/>
  <rect x="148" y="72" width="12" height="8" rx="1.5" fill="#e8e8e2" opacity="0.9"/>
  <rect x="42" y="60" width="130" height="14" rx="6"
        fill="#ff5500" opacity="0.18" filter="url(#glow-halo-l)"/>
  <rect x="52" y="67" width="110" height="5" rx="2.5"
        fill="url(#ember-l)" filter="url(#glow-edge-l)"/>
</svg>

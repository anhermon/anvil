<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    Anvil icon — 64×64, readable at 32×32 and 16×16.
    Matches the board-approved reference: dark rounded-square,
    steel-gray anvil, orange ember glow on the work face.
  -->
  <defs>
    <radialGradient id="ic-bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#111111"/>
    </radialGradient>
    <linearGradient id="ic-steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#909090"/>
      <stop offset="30%"  stop-color="#686868"/>
      <stop offset="70%"  stop-color="#505050"/>
      <stop offset="100%" stop-color="#383838"/>
    </linearGradient>
    <linearGradient id="ic-face" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#686868"/>
      <stop offset="45%"  stop-color="#a0a0a0"/>
      <stop offset="55%"  stop-color="#a0a0a0"/>
      <stop offset="100%" stop-color="#686868"/>
    </linearGradient>
    <linearGradient id="ic-ember" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#bb2200" stop-opacity="0"/>
      <stop offset="10%"  stop-color="#ff4400"/>
      <stop offset="40%"  stop-color="#ff7700"/>
      <stop offset="60%"  stop-color="#ff7700"/>
      <stop offset="90%"  stop-color="#ff4400"/>
      <stop offset="100%" stop-color="#bb2200" stop-opacity="0"/>
    </linearGradient>
    <filter id="ic-glow" x="-30%" y="-600%" width="160%" height="1400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ic-halo" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="13" fill="url(#ic-bg)"/>

  <!-- Ambient halo above work face -->
  <ellipse cx="37" cy="23" rx="22" ry="7"
           fill="#ff5500" opacity="0.35" filter="url(#ic-halo)"/>

  <!-- Main body -->
  <path d="
    M 17,28 L 52,28 L 52,32
    C 50,32 49,34 48,37
    L 47,42 L 50,47 L 50,53
    L 36,53 L 35,48 L 29,48
    L 28,53 L 14,53 L 14,47
    L 17,42 L 16,37
    C 15,34 13,32 11,32
    L 11,28 Z
  " fill="url(#ic-steel)"/>

  <!-- Horn -->
  <path d="
    M 11,28 L 17,28 L 17,32
    C 14,32 12,32 11,32
    C 8,32 4,30 4,28
    C 4,26 8,24 11,28 Z
  " fill="url(#ic-steel)"/>

  <!-- Work face -->
  <rect x="17" y="24" width="35" height="5" rx="1" fill="url(#ic-face)"/>

  <!-- Hardy hole -->
  <rect x="47" y="25" width="4" height="3.5" rx="0.5"
        fill="#111111" opacity="0.9"/>

  <!-- Ambient glow layer -->
  <rect x="14" y="20" width="38" height="5" rx="2"
        fill="#ff5500" opacity="0.4" filter="url(#ic-halo)"/>

  <!-- Ember line -->
  <rect x="17" y="22" width="35" height="2.5" rx="1.25"
        fill="url(#ic-ember)" filter="url(#ic-glow)"/>
</svg>

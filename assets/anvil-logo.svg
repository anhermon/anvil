<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80">
  <!--
    Anvil logo lockup — 280×80.
    Left (0–72): icon with dark bg + ember glow (matches anvil-icon.svg).
    Right (82–280): "anvil" wordmark, geometric stroke letterforms.
    Designed against a dark background; use light fill for light contexts.
  -->
  <defs>
    <!-- Icon bg -->
    <radialGradient id="lg-bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#111111"/>
    </radialGradient>
    <!-- Steel -->
    <linearGradient id="lg-steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#909090"/>
      <stop offset="30%"  stop-color="#686868"/>
      <stop offset="70%"  stop-color="#505050"/>
      <stop offset="100%" stop-color="#383838"/>
    </linearGradient>
    <!-- Face -->
    <linearGradient id="lg-face" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#686868"/>
      <stop offset="45%"  stop-color="#a0a0a0"/>
      <stop offset="55%"  stop-color="#a0a0a0"/>
      <stop offset="100%" stop-color="#686868"/>
    </linearGradient>
    <!-- Ember -->
    <linearGradient id="lg-ember" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#bb2200" stop-opacity="0"/>
      <stop offset="10%"  stop-color="#ff4400"/>
      <stop offset="40%"  stop-color="#ff7700"/>
      <stop offset="60%"  stop-color="#ff7700"/>
      <stop offset="90%"  stop-color="#ff4400"/>
      <stop offset="100%" stop-color="#bb2200" stop-opacity="0"/>
    </linearGradient>
    <!-- Glow -->
    <filter id="lg-glow" x="-30%" y="-600%" width="160%" height="1400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lg-halo" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <!-- Clip icon to rounded square -->
    <clipPath id="lg-clip">
      <rect x="4" y="4" width="64" height="72" rx="14"/>
    </clipPath>
  </defs>

  <!-- === ICON (64×72, top-left at 4,4) === -->
  <rect x="4" y="4" width="64" height="72" rx="14" fill="url(#lg-bg)"/>
  <g clip-path="url(#lg-clip)">
    <!-- Ambient halo -->
    <ellipse cx="38" cy="25" rx="23" ry="7"
             fill="#ff5500" opacity="0.35" filter="url(#lg-halo)"/>
    <!-- Body -->
    <path d="
      M 18,32 L 57,32 L 57,37
      C 55,37 53,39 52,43
      L 51,49 L 55,55 L 55,62
      L 40,62 L 39,56 L 32,56
      L 31,62 L 16,62 L 16,55
      L 20,49 L 19,43
      C 18,39 16,37 14,37
      L 14,32 Z
    " fill="url(#lg-steel)"/>
    <!-- Horn -->
    <path d="
      M 14,32 L 18,32 L 18,37
      C 16,37 14,37 14,37
      C 11,37 7,35 7,33
      C 7,31 11,28 14,32 Z
    " fill="url(#lg-steel)"/>
    <!-- Work face -->
    <rect x="18" y="27" width="39" height="6" rx="1.2" fill="url(#lg-face)"/>
    <!-- Hardy hole -->
    <rect x="52" y="28.5" width="4.5" height="4" rx="0.6"
          fill="#111111" opacity="0.9"/>
    <!-- Ambient glow -->
    <rect x="15" y="22" width="42" height="7" rx="2.5"
          fill="#ff5500" opacity="0.38" filter="url(#lg-halo)"/>
    <!-- Ember line -->
    <rect x="18" y="24" width="39" height="3" rx="1.5"
          fill="url(#lg-ember)" filter="url(#lg-glow)"/>
  </g>

  <!-- Divider -->
  <line x1="78" y1="16" x2="78" y2="64"
        stroke="#777777" stroke-width="1"
        stroke-linecap="round" opacity="0.3"/>

  <!-- === WORDMARK: "anvil"
       Geometric stroke letterforms. Cap-height 28px.
       Baseline y=58. Start x=88.
       Stroke: 4.2px, round caps + joins.
  === -->
  <g stroke="#d8d8d8" stroke-width="4.2"
     stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- a: open circular bowl + right stem -->
    <path d="M 104,50 A 10,10 0 1,0 104,52"/>
    <line x1="104" y1="40" x2="104" y2="58"/>

    <!-- n: left stem + arch + right stem -->
    <line x1="116" y1="40" x2="116" y2="58"/>
    <path d="M 116,45 C 116,38 124,38 124,38 C 132,38 132,45 132,45 L 132,58"/>

    <!-- v: two converging legs -->
    <polyline points="140,39 147,58 154,39"/>

    <!-- i: stem + dot -->
    <line x1="162" y1="46" x2="162" y2="58"/>
    <circle cx="162" cy="36" r="2.5" fill="#d8d8d8" stroke="none"/>

    <!-- l: tall stem -->
    <line x1="172" y1="28" x2="172" y2="58"/>
  </g>
</svg>
